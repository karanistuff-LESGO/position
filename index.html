<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.sticky{
            position: sticky;
            top: 0;
            background-color: yellow;
        }
        div.relative{
            position: relative;
            top: 20px;
            left: 20px;
            background-color: lightblue;
        }
        div.absolute{
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: lightgreen;
        }
        div.fixed{
            position: fixed;
            top: 0;
            right: 0;
            background-color: lightcoral;
        }
        </style>
</head>
<body>
    <!-- change the position to show difference 
     static
     relative 
     absolute
     fixed
     sticky -->

     <h2>positioning</h2>
     <div>
        div with no position property
     </div>
     <div class="sticky">
        div with sticky position property
     </div>
     <div class="relative">
        div with relative position property;
        <div class="absolute">
            div with absolute position property
        </div>
        </div>

        <div class="fixed">
div with fixed position property
        </div>

        <br><br><br><br><br><br><br><br><br><br>
</body>
