<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p {
            opacity: 0.5;
        }
        .first {
            opacity: 0.8;
        }
        .second {
            opacity: 0.6;
        }
        .third {
            opacity: 0.4;
        }
        </style>
</head>
<body>
    <h1> the opacity property </h1>
    <p>This is a paragraph with reduced opacity.</p>

    <div class="first">
        <p>This is the first div.</p>
    </div>
    <div class="second">
        <p>This is the second div.</p>
    </div>
    <div class="third">
        <p>This is the third div.</p>
        </div>

</body>
</html>
